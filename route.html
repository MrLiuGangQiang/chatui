  .phase-orbit { fill: none; stroke-dasharray: 3 10; transform-box: fill-box; transform-origin: center; animation: orbit-spin 16s linear infinite; }

  .data-pulse { transform-box: fill-box; transform-origin: center; animation: data-pulse 1.9s ease-in-out infinite; }
